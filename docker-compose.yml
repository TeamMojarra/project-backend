services:
  db:
    image: postgres:16
    container_name: reservent_db
    restart: always
    environment:
      POSTGRES_DB: reservent_db
      POSTGRES_USER: reservent
      POSTGRES_PASSWORD: pass1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reservent -d reservent_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: reservent_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://reservent:pass1234@db:5432/reservent_db
      SECRET_KEY: reservent_secret_key_dev_2024_change_in_production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
